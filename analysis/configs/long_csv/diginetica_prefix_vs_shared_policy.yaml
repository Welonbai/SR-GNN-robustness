# Compare the post-batch-size-change Prefix-NZ run against the shared-policy run.

defaults:
  slice_policy: largest_complete_prefix
  requested_victims:
    - srgnn
    - miasrec
    - tron
  requested_target_count: 3

jobs:
  - summary: outputs/runs/diginetica/attack_prefix_nonzero_when_possible/run_group_14818d6dd6/summary_current.json
    output_name: diginetica_prefix_nonzero_prefix_vs_shared_policy

  - summary: outputs/runs/diginetica/attack_position_opt_shared_policy_ratio1/run_group_c1835ab73f/summary_current.json
    output_name: diginetica_position_opt_shared_policy_prefix_vs_shared_policy
