style_name: phase4_semantic_validation

output_format: png

input_dir: results\comparisons\clean_vs_dpsbr_vs_random_nonzero_diginetica_popular_0.1size\phase2_metric_scope_validation

title:
  template: "Diginetica_phase4_semantic_validation"
  align: center
  font_size: 12
  color: black

figure:
  width: 16
  height: 6.5
  dpi: 220
  background_color: white

table:
  font_size: 11
  round_digits: 6
  text_color: black
  show_grid: true
  auto_shrink: false
  wrap_text: false
  cell_align: center
  display_alias:
    labels:
      attack_method: Attack
      victim_model: Victim
      metric_name: Metric
      metric_scope: Scope
    attack_method:
      dpsbr_baseline: DPSBR
      random_nonzero_when_possible: Random-NZ
    victim_model:
      miasrec: MIARec
    metric_scope:
      ground_truth: GT
      targeted: Target
    metric_name:
      mrr: MRR
      recall: Recall
  value_alias: {}
  scope_colors:
    metric_scope:
      ground_truth: "#E8F1FF"
      targeted: "#FFF0E1"
  best_value_bolding:
    compare_along: rows
    mode: max
  top_level_group_separators: true
