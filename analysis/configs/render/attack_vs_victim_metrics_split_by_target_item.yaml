style_name: attack_vs_victim_metrics_split_by_target_item

output_format: png

title:
  template: "Diginetica | target={target_item} | {target_type} | attack_size={attack_size}"
  align: center
  font_size: 12
  color: black

figure:
  width: 14
  height: 6
  dpi: 220
  background_color: white

table:
  font_size: 12
  round_digits: 6
  signed_percent_round_digits: 3
  text_color: black
  show_grid: true
  auto_shrink: false
  wrap_text: false
  cell_align: center
  top_level_group_separators: true

  display_alias:
    labels:
      attack_method: Attack
      victim_model: Victim
      metric_name: Metric
      metric_scope: Scope
      k: K

    attack_method:
      clean: Clean
      dpsbr_baseline: DPSBR
      prefix_nonzero_when_possible: Prefix-NZ
      random_nonzero_when_possible: Random-NZ
      position_opt_mvp: PosOptMVP

    victim_model:
      miasrec: MiaSRec
      srgnn: SRGNN
      tron: TRON

    metric_name:
      precision: Precision
      recall: Recall
      mrr: MRR
      ndcg: NDCG

    metric_scope:
      ground_truth: GT
      targeted: Target

  value_alias: {}

  dimension_value_orders:
    attack_method:
      - clean
      - dpsbr_baseline
      - prefix_nonzero_when_possible
      - random_nonzero_when_possible
      - position_opt_mvp

  best_value_bolding:
    compare_along: rows
    mode: max
    underline_second_best: true
    partition_by_levels:
      - victim_model
