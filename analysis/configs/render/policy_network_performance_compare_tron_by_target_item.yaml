style_name: policy_network_performance_compare_tron_by_target_item

output_format: png

title:
  template: "Diginetica | TRON | target={target_item} | Policy Network Performance Comparison"
  align: center
  font_size: 12
  color: black

figure:
  width: 12
  height: 4.8
  dpi: 220
  background_color: white

table:
  font_size: 12
  round_digits: 6
  signed_percent_round_digits: 3
  text_color: black
  show_grid: true
  auto_shrink: false
  wrap_text: false
  cell_align: center
  top_level_group_separators: true

  display_alias:
    labels:
      attack_method: Attack
      metric_name: Metric
      metric_scope: Scope
      k: K

    attack_method:
      clean: Clean
      position_opt_mvp: OptMVP Baseline
      position_opt_shared_policy: Policy Network

    metric_name:
      precision: Precision
      recall: Recall
      mrr: MRR
      ndcg: NDCG

    metric_scope:
      ground_truth: GT
      targeted: Target

  value_alias: {}

  dimension_value_orders:
    attack_method:
      - clean
      - position_opt_mvp
      - position_opt_shared_policy

  best_value_bolding:
    compare_along: rows
    mode: max
    underline_second_best: true
