experiment:
  name: valbest_attack_tacs_local_position_pool3_final1_srgnn_target11103

data:
  dataset_name: diginetica
  split_protocol: unified
  poison_train_only: true
  canonical_split:
    min_item_count: 5
    min_session_len: 2
    valid_ratio: 0.1
    test_days: 7

seeds:
  fake_session_seed: 20260405
  target_selection_seed: 20260405
  position_opt_seed: 20260405
  surrogate_train_seed: 20260405
  victim_train_seed: 20260405

attack:
  size: 0.01
  fake_session_generation_topk: 100
  replacement_topk_ratio: 1.0
  carrier_selection:
    enabled: true
    candidate_pool_size: 0.03
    final_attack_size: 0.01
    scorer: hybrid_local_position_compatibility
    placement_mode: best_local_position
    operation: replacement
    candidate_positions: nonzero
    embedding_weight: 0.4
    cooccurrence_weight: 0.3
    transition_weight: 0.3
    use_length_control: true
    length_buckets: exact_until_4_plus
    normalize: minmax
    local_embedding_weight: 0.5
    local_transition_weight: 0.5
    session_compatibility_weight: 0.0
    left_to_target_weight: 1.0
    target_to_right_weight: 0.0
    debug_save_all_session_records: false
  poison_model:
    name: srgnn
    params:
      train:
        epochs: 30
        batch_size: 100
        hidden_size: 100
        lr: 0.001
        lr_dc: 0.1
        lr_dc_step: 3
        l2: 1.0e-5
        step: 1
        patience: 10
        nonhybrid: false
        checkpoint_protocol: validation_best
        best_metric: valid_ground_truth_mrr@20
        patience_metric: recall20_or_mrr20

targets:
  mode: explicit_list
  explicit_list: [11103]
  bucket: popular
  count: 1
  reuse_saved_targets: true

victims:
  enabled: [srgnn]
  params:
    srgnn:
      train:
        epochs: 30
        batch_size: 100
        hidden_size: 100
        lr: 0.001
        lr_dc: 0.1
        lr_dc_step: 3
        l2: 1.0e-5
        step: 1
        patience: 10
        nonhybrid: false
        checkpoint_protocol: validation_best
        best_metric: valid_ground_truth_mrr@20
        patience_metric: recall20_or_mrr20

evaluation:
  topk: [5, 10, 15, 20, 25, 30, 40, 50]
  targeted_metrics: [precision, recall, mrr, ndcg]
  ground_truth_metrics: [precision, recall, mrr, ndcg]

artifacts:
  root: outputs
  shared_dir: shared
  runs_dir: runs
