experiment:
  name: attack_rank_bucket_cem_scratch4epoch_surrogate_tiny_valbest_11103

data:
  dataset_name: diginetica
  split_protocol: unified
  poison_train_only: true
  canonical_split:
    min_item_count: 5
    min_session_len: 2
    valid_ratio: 0.1
    test_days: 7

seeds:
  fake_session_seed: 20260405
  target_selection_seed: 20260405
  position_opt_seed: 20260405
  surrogate_train_seed: 20260405
  victim_train_seed: 20260405

attack:
  size: 0.01
  fake_session_generation_topk: 100
  replacement_topk_ratio: 1.0
  position_opt:
    clean_surrogate_checkpoint: null
    nonzero_action_when_possible: true
    fine_tune_steps: 0
    validation_subset_size: null
    reward_mode: poisoned_target_utility
    enable_gt_penalty: false
    gt_penalty_weight: 0.0
    gt_tolerance: 0.0
  rank_bucket_cem:
    iterations: 3
    population_size: 4
    population_per_iteration: [4, 2, 2]
    elite_ratio: 0.25
    initial_std: 1.0
    min_std: 0.2
    smoothing: 0.3
    reward_metric: normalized_lowk_mrr_recall_10_20
    save_candidate_selected_positions: true
    save_final_selected_positions: true
    save_optimized_poisoned_sessions: true
    save_replay_metadata: true
    surrogate_eval_poison_balance:
      enabled: false
      mode: fixed_ratio
      poison_ratio_in_batch: 0.20
      loss_weighting: none
    surrogate_evaluator:
      mode: full_retrain_validation_best
      max_epochs: 4
      patience: 5
  poison_model:
    name: srgnn
    params:
      train:
        epochs: 30
        batch_size: 100
        hidden_size: 100
        lr: 0.001
        lr_dc: 0.1
        lr_dc_step: 3
        l2: 1.0e-5
        step: 1
        patience: 10
        nonhybrid: false
        checkpoint_protocol: validation_best
        best_metric: valid_ground_truth_mrr@20
        patience_metric: recall20_or_mrr20

targets:
  mode: explicit_list
  explicit_list: [11103]
  bucket: popular
  count: 1
  reuse_saved_targets: false

victims:
  enabled: [srgnn]
  params:
    srgnn:
      train:
        epochs: 30
        batch_size: 100
        hidden_size: 100
        lr: 0.001
        lr_dc: 0.1
        lr_dc_step: 3
        l2: 1.0e-5
        step: 1
        patience: 10
        nonhybrid: false
        checkpoint_protocol: validation_best
        best_metric: valid_ground_truth_mrr@20
        patience_metric: recall20_or_mrr20

evaluation:
  topk: [5, 10, 15, 20, 25, 30, 40, 50]
  targeted_metrics: [precision, recall, mrr, ndcg]
  ground_truth_metrics: [precision, recall, mrr, ndcg]

artifacts:
  root: outputs
  shared_dir: shared
  runs_dir: runs
