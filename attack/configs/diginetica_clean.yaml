experiment:
  name: clean_run_no_attack

data:
  dataset_name: diginetica
  split_protocol: unified
  poison_train_only: true

seeds:
  fake_session_seed: 20260405
  target_selection_seed: 20260405

attack:
  size: 0.01
  fake_session_generation_topk: 100
  replacement_topk_ratio: 0.2
  poison_model:
    name: srgnn

targets:
  mode: sampled
  explicit_list: []
  bucket: popular
  count: 5
  reuse_saved_targets: true

victims:
  enabled: [srgnn, miasrec, tron]

evaluation:
  topk: [5, 10, 15, 20, 25, 30, 40, 50]
  metrics: [targeted_precision, targeted_recall, targeted_mrr, targeted_ndcg]

artifacts:
  root: outputs
  shared_dir: shared
  runs_dir: runs
